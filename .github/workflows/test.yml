name: test

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo and runs tests. It never
# needs to write contents, packages, or any other scope. Pinning permissions
# here means even a compromised step (or action) can't push to the repo or
# mint a writable token. Critical because this runs on `pull_request` from
# forks.
permissions:
  contents: read

jobs:
  offline:
    name: offline test suite
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA, not a mutable @v4 tag. A tag
      # can be repointed by a compromised maintainer or a tag-hijack (cf. the
      # 2025 tj-actions/changed-files incident) and would silently run attacker
      # code in our PR-triggered pipeline. The trailing comment records the
      # human-readable version the SHA corresponds to; bump both together.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      # jq is needed by the CLI tests that drive bin/tdoc-* hermetically.
      - name: Ensure jq
        run: jq --version || sudo apt-get update && sudo apt-get install -y jq
      # No npm install — the offline suite has zero dependencies (pure node +
      # bash + jq). Runs with no Cloudflare secrets.
      - name: Run offline tests
        run: npm test
      # Manifest schema guard: plugin.json + marketplace.json must match the
      # field types Claude Code validates at load/install time. This class of
      # bug shipped to users 4x (#36 owner, #42 repository) — keep it pinned.
      # (npm test already runs this; the explicit step makes CI logs self-
      # documenting and survives a runner restructure.)
      - name: Validate plugin/marketplace manifests
        run: node test/manifest.test.js
      # Static guard: the bundled worker must not still contain the overlay
      # placeholder, and worker/server/overlay must parse.
      - name: Syntax check
        run: |
          node --check worker/worker.js
          node --check server/server.js
          node --check server/overlay.js
          bash -n bin/tdoc-publish
          bash -n bin/tdoc-pull
          bash -n bin/tdoc-new
          bash -n bin/tdoc-doctor
      # ShellCheck the credential-handling CLIs. `bash -n` above only catches
      # syntax errors; ShellCheck catches the dangerous class — unquoted
      # expansions in a token path, word-splitting in a curl arg, sed on
      # untrusted input — which is exactly where a script that reads Cloudflare
      # OAuth tokens and builds Authorization headers gets a real bug.
      # shellcheck is preinstalled on ubuntu-latest runners.
      #
      # SC2034 (unused variable) is excluded: it's pure style hygiene, not a
      # security/correctness signal, and the existing scripts keep a couple of
      # intentional scaffolding vars (e.g. HTML_PATH, HAS_JQ). The gate is for
      # the dangerous classes (quoting/word-splitting/injection), not lint nits.
      - name: ShellCheck CLIs
        run: shellcheck --severity=warning --exclude=SC2034 bin/tdoc-publish bin/tdoc-doctor bin/tdoc-pull bin/tdoc-new bin/tdoc-unpublish bin/tdoc-update

  # Browser suites (playwright). A SEPARATE job from `offline` so a browser/
  # playwright hiccup never blocks the zero-dependency offline gate. Runs on the
  # free ubuntu-latest runner: the suites boot server/server.js against the
  # committed fixture, so they need NO Cloudflare secrets. This is the coverage
  # that used to run on nobody's machine (playwright is an optional dep, gated
  # out of the offline suite), which is how the v0.8.0 comment-interaction
  # regression could ship without any red signal.
  browser:
    name: browser suite (playwright)
    runs-on: ubuntu-latest
    steps:
      # Same SHA-pinning discipline as the offline job (see note above).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      # playwright is the repo's optional dep. Install it + chromium with the OS
      # libraries the headless browser needs (`--with-deps` runs the apt step).
      - name: Install Playwright + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium
      # Runs ONLY the browser subset (responsive + ui) via run.js --browser —
      # never the Cloudflare-gated publish/onboarding suites.
      - name: Run browser suites
        run: node test/run.js --browser
